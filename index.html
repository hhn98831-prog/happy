<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D星空</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050510; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        const BG_COLOR = "#050510";
        const STAR_COLORS = [
            "#FFD700", "#FFA500", "#FF6347", "#FF69B4", "#FFB6C1",
            "#00BFFF", "#87CEEB", "#FFFFFF", "#ADD8E6", "#FFC0CB",
            "#FF1493", "#FF4500", "#7FFFD4", "#FFDAB9", "#E0FFFF"
        ];

        // 3D 数学工具
        function rotateX(x, y, z, angle) {
            const cos = Math.cos(angle), sin = Math.sin(angle);
            return [x, y * cos - z * sin, y * sin + z * cos];
        }
        function rotateY(x, y, z, angle) {
            const cos = Math.cos(angle), sin = Math.sin(angle);
            return [x * cos + z * sin, y, -x * sin + z * cos];
        }
        function rotateZ(x, y, z, angle) {
            const cos = Math.cos(angle), sin = Math.sin(angle);
            return [x * cos - y * sin, x * sin + y * cos, z];
        }
        function project(x, y, z, scale = 200, offsetZ = 5) {
            const factor = scale / (z + offsetZ);
            return [x * factor + W / 2, y * factor + H / 2, z];
        }

        // 星轨粒子
        class StarPoint {
            constructor(orbitRadius, heightRange, speed, color) {
                this.orbitRadius = orbitRadius;
                this.heightRange = heightRange;
                this.speed = speed;
                this.color = color;
                this.trail = [];
                this.angle = Math.random() * Math.PI * 2;
                this.y = heightRange[0] + Math.random() * (heightRange[1] - heightRange[0]);
                this.updatePos();
            }
            updatePos() {
                this.x = this.orbitRadius * Math.cos(this.angle);
                this.z = this.orbitRadius * Math.sin(this.angle);
            }
            update() {
                this.angle += this.speed;
                this.updatePos();
                this.y += (Math.random() - 0.5) * 0.2;
                this.y = Math.max(this.heightRange[0], Math.min(this.heightRange[1], this.y));
                this.trail.push([this.x, this.y, this.z]);
                if (this.trail.length > 8) this.trail.shift();
            }
            draw(ctx, angleX, angleY, angleZ) {
                for (let i = 0; i < this.trail.length; i++) {
                    let [tx, ty, tz] = this.trail[i];
                    [tx, ty, tz] = rotateX(tx, ty, tz, angleX);
                    [tx, ty, tz] = rotateY(tx, ty, tz, angleY);
                    [tx, ty, tz] = rotateZ(tx, ty, tz, angleZ);
                    const [sx, sy] = project(tx, ty, tz, 180);
                    const alpha = 0.1 + (i / this.trail.length) * 0.9;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = this.color;
                    const r = Math.max(1, 2.5 * alpha);
                    ctx.beginPath();
                    ctx.arc(sx, sy, r, 0, Math.PI * 2);
                    ctx.fill();
                }
                // 当前点
                let [rx, ry, rz] = rotateX(this.x, this.y, this.z, angleX);
                [rx, ry, rz] = rotateY(rx, ry, rz, angleY);
                [rx, ry, rz] = rotateZ(rx, ry, rz, angleZ);
                const [sx, sy] = project(rx, ry, rz, 180);
                ctx.globalAlpha = 1;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(sx, sy, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(sx, sy, 5, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // 主程序
        let stars = [], shootingStars = [];
        let angleX = 0.3, angleY = 0, angleZ = 0;

        function init() {
            resize();
            window.addEventListener('resize', resize);

            // 生成星轨
            for (let i = 0; i < 80; i++) {
                stars.push(new StarPoint(
                    2 + Math.random() * 1.5, [-0.5, 0.5],
                    0.02 + Math.random() * 0.02,
                    STAR_COLORS[Math.floor(Math.random() * 5)]
                ));
            }
            for (let i = 0; i < 80; i++) {
                stars.push(new StarPoint(
                    3.5 + Math.random() * 2, [-1.5, 1.5],
                    0.015 + Math.random() * 0.015,
                    STAR_COLORS[5 + Math.floor(Math.random() * (STAR_COLORS.length - 5))]
                ));
            }
            for (let i = 0; i < 80; i++) {
                stars.push(new StarPoint(
                    5.5 + Math.random() * 2, [-2.5, 2.5],
                    0.01 + Math.random() * 0.01,
                    STAR_COLORS[8 + Math.floor(Math.random() * (STAR_COLORS.length - 8))]
                ));
            }
            // 流星
            for (let i = 0; i < 15; i++) addShootingStar();

            requestAnimationFrame(loop);
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function addShootingStar() {
            const angle = Math.random() * Math.PI * 2;
            const rad = 1 + Math.random() * 6;
            shootingStars.push({
                x: rad * Math.cos(angle),
                y: (Math.random() - 0.5) * 6,
                z: rad * Math.sin(angle),
                vx: (Math.random() - 0.5) * 0.2,
                vy: (Math.random() - 0.5) * 0.2,
                vz: (Math.random() - 0.5) * 0.2,
                life: 20 + Math.random() * 20,
                color: STAR_COLORS[Math.floor(Math.random() * 3)]
            });
        }

        function blendColor(c1, c2, alpha) {
            const r1 = parseInt(c1.slice(1,3), 16), g1 = parseInt(c1.slice(3,5), 16), b1 = parseInt(c1.slice(5,7), 16);
            const r2 = parseInt(c2.slice(1,3), 16), g2 = parseInt(c2.slice(3,5), 16), b2 = parseInt(c2.slice(5,7), 16);
            const r = Math.round(r1 + (r2 - r1) * alpha);
            const g = Math.round(g1 + (g2 - g1) * alpha);
            const b = Math.round(b1 + (b2 - b1) * alpha);
            return `rgb(${r},${g},${b})`;
        }

        function loop() {
            ctx.clearRect(0, 0, W, H);
            // 背景光晕
            for (let i = 0; i < 10; i++) {
                const alpha = 1 - i/10;
                ctx.fillStyle = blendColor("#050510", "#0a0a2e", alpha);
                ctx.beginPath();
                const r = 100 - i * 20;
                ctx.arc(W/2, H/2, r, 0, Math.PI*2);
                ctx.fill();
            }
            // 更新与绘制
            for (let star of stars) {
                star.update();
                star.draw(ctx, angleX, angleY, angleZ);
            }
            // 流星
            for (let i = shootingStars.length - 1; i >= 0; i--) {
                const s = shootingStars[i];
                s.x += s.vx; s.y += s.vy; s.z += s.vz;
                s.life--;
                let [rx, ry, rz] = rotateX(s.x, s.y, s.z, angleX);
                [rx, ry, rz] = rotateY(rx, ry, rz, angleY);
                [rx, ry, rz] = rotateZ(rx, ry, rz, angleZ);
                const [sx, sy] = project(rx, ry, rz, 180);
                if (s.life > 0) {
                    ctx.strokeStyle = s.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(sx-10, sy-10);
                    ctx.stroke();
                    ctx.fillStyle = s.color;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 2, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    shootingStars.splice(i, 1);
                    addShootingStar();
                }
            }
            angleY += 0.005;
            angleZ += 0.003;
            requestAnimationFrame(loop);
        }

        init();
    </script>
</body>
</html>
